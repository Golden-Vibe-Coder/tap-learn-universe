<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tap Learn Universe</title>
  <!-- Favicon: Universe icon by Icons8 – https://icons8.com/icon/qCA6hpfjElBK/universe -->
  <link rel="icon" type="image/png" href="Icons/icons8-universe-48.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Icons/icons8-universe-48.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<body>
  <nav id="mode-bar">
    <button class="mode-btn active" data-mode="numbers">
      <span class="mode-icon">123</span>
      <span class="mode-label">Numbers</span>
    </button>
    <button class="mode-btn" data-mode="alphabet">
      <span class="mode-icon">ABC</span>
      <span class="mode-label">Alphabet</span>
    </button>
  </nav>
  <canvas id="gameCanvas"></canvas>
  <a id="attribution" href="https://icons8.com" target="_blank" rel="noopener">Icons by Icons8</a>
  <script src="js/game.js"></script>
